            {
                image: "https://media.power-cdn.net/images/h-2d9259803ed4a420503286a6269a4bf4/products/4121354/4121354_7_600x600_t_g.webp",
                title: "Ninja CREAMi deluxe",
                link: "https://www.power.dk/koekken-og-madlavning/koekkenmaskiner-og-miksere/is-og-slush-maskiner/ninja-creami-deluxe-nc502eu-10-in-1-ismaskine/p-4121354/?utm_source=pricerunner&utm_medium=cpc&utm_campaign=pricerunner",
                details: {}

                details: {
                    "opløsning:": "2560x1080"
                }
            }
        ];


        // Function to create wishlist item HTML
        function createWishlistItem(item) {
            const detailsHTML = Object.entries(item.details)
                .map(([key, value]) => `
                    <div class="item-detail">
                        <span class="detail-key">${key}:</span>
                        <span class="detail-value">${value}</span>
                    </div>
                `).join('');

            return `
                <a href="${item.link}" target="_blank" class="wishlist-item">
                    <img src="${item.image}" alt="${item.title}" class="item-image">
                    <div class="item-title">
                        ${item.title}
                    </div>
                    <div class="item-details">
                        ${detailsHTML}
                    </div>
                </a>
            `;
        }

        // Render all wishlist items
        function renderWishlist() {
            const container = document.getElementById('wishlist');
            container.innerHTML = wishlistItems.map(createWishlistItem).join('');
        }

        // Initialize wishlist when page loads
        renderWishlist();
    </script>
</body>
