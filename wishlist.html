<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist</title>
    <link rel="stylesheet" href="wishlist.css">
</head>

<body>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <div class="container">
        <h1>Tubbe's Ønskesky</h1>
        <div class="wishlist-grid" id="wishlist"></div>
    </div>

    <script>
        // Define your wishlist items here
        const wishlistItems = [
            {
                image: "https://spilforsyningen.dk/cdn/shop/files/69a3c249-d5ba-4a3f-a404-dcfc3d4c6183.png?v=1772740413&width=640",
                title: "Sparmax AC-501X Kompressor",
                link: "https://spilforsyningen.dk/products/sparmax-airbrush-compressor-ac-501x",
                details: {
                    "Type": "Airbrush kompressor",
                    "Pris": "1.999,95 kr.",
                }
            },
            {
                image: "https://m.media-amazon.com/images/I/51dN4HvR-oL._SL1000_.jpg",
                title: "The Lord of the Rings (3 Book Box Set)",
                link: "https://www.amazon.de/dp/0261102389",
                details: {
                    "Forfatter": "J.R.R. Tolkien",
                    "Format": "Box set – alle 3 bøger",
                }
            },
            {
                image: "https://www.kaufmann.dk/cdn-cgi/image/width%3D1080%2Cheight%3D1080%2Cformat%3Dauto/media/97/42/9e/1761821204/181567_SORT-01.png",
                title: "Vans Old Skool Wide Fit (sort)",
                link: "https://www.vans.com/en-dk/p/old-skool-wide-fit-shoes-VN0000T8BMX",
                details: {
                    "Størrelse": "45 / 45.5 (Wide)",
                    "Farve": "Sort",
                }
            }
        ];

        // Function to create wishlist item HTML
        function createWishlistItem(item) {
            const detailsHTML = Object.entries(item.details)
                .map(([key, value]) => `
                    <div class="item-detail">
                        <span class="detail-key">${key}:</span>
                        <span class="detail-value">${value}</span>
                    </div>
                `).join('');

            return `
                <a href="${item.link}" target="_blank" class="wishlist-item">
                    <img src="${item.image}" alt="${item.title}" class="item-image">
                    <div class="item-title">
                        ${item.title}
                    </div>
                    <div class="item-details">
                        ${detailsHTML}
                    </div>
                </a>
            `;
        }

        // Render all wishlist items
        function renderWishlist() {
            const container = document.getElementById('wishlist');
            container.innerHTML = wishlistItems.map(createWishlistItem).join('');
        }

        // Initialize wishlist when page loads
        renderWishlist();
    </script>
</body>

</html>
